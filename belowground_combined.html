<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Belowground Network Explorer</title>

<!--
=====================================================================
  BELOWGROUND NETWORK EXPLORER
  Summary of updates
=====================================================================

  1. MAP TOGGLES
     A mutually exclusive segmented control (three buttons) switches
     between:
        Button 1  ->  map1_suitability.html
        Button 2  ->  map2_fungal_network.html
        Button 3  ->  map3_tree_network.html
     Only one map is shown at a time.

  2. MARQUEE ZOOM
     The map is fully interactive by default: drag to pan, scroll or
     use plus and minus to zoom. A floating zoom toolbar sits over the
     top-right of the map. Click the box-select icon to arm marquee
     zoom, then drag a rectangle. Click the reset icon to reload the
     map to its starting extent.

  3. INFO POPOVERS
     Small info buttons sit next to the Trees and Fungi labels.
     Clicking one opens a popover with data source details and a
     direct link to the original dataset. Edit the EDIT BLOCK below
     to update the text.

  4. METADATA STRIP
     Origin years for tree census data and fungal observations are
     shown under the controls, along with the fungal network count.

  5. NETWORK CALCULATION
     A connected components algorithm (union find) counts distinct
     fungal networks from edges drawn on map2. Result shown in the
     metadata strip.

  Constraint honored: no em dashes anywhere in this file.
=====================================================================
-->

<style>
  :root {
    --ink: #1b2a1b;
    --bg: #f4f7f2;
    --panel: #ffffff;
    --accent: #2e7d32;
    --accent-soft: #e2efe2;
    --border: #cdd8cd;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    color: var(--ink);
    background: var(--bg);
  }

  header {
    padding: 14px 20px 10px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 14px;
  }

  .segmented {
    display: inline-flex;
    border: 1px solid var(--accent);
    border-radius: 8px;
    overflow: hidden;
  }

  .segmented button {
    border: none;
    background: var(--panel);
    color: var(--accent);
    padding: 9px 16px;
    font-size: 14px;
    cursor: pointer;
    border-right: 1px solid var(--accent);
  }

  .segmented button:last-child { border-right: none; }

  .segmented button.active {
    background: var(--accent);
    color: #fff;
  }

  .label-group {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
  }

  .info-btn {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1px solid var(--accent);
    background: var(--panel);
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    line-height: 1;
    padding: 0;
  }

  .info-btn:hover { background: var(--accent-soft); }

  .metadata {
    margin-top: 10px;
    font-size: 13px;
    color: #46564a;
  }

  .metadata span { margin-right: 18px; }

  /* Map area */
  .map-stage {
    position: relative;
    width: 100%;
    height: calc(100vh - 180px);
    min-height: 420px;
  }

  .map-stage iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: none;
  }

  .map-stage iframe.active { display: block; }

  /*
    Marquee overlay: pointer-events none by default so the map works
    normally. Armed class enables capture for one box drag.
  */
  .marquee-overlay {
    position: absolute;
    inset: 0;
    z-index: 5;
    background: transparent;
    pointer-events: none;
  }

  .marquee-overlay.armed {
    pointer-events: auto;
    cursor: crosshair;
  }

  .marquee-box {
    position: absolute;
    border: 1.5px dashed var(--accent);
    background: rgba(46, 125, 50, 0.15);
    pointer-events: none;
    display: none;
  }

  /* Floating zoom toolbar: top-right corner of the map */
  .zoom-toolbar {
    position: absolute;
    top: 12px;
    right: 12px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .zoom-icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--ink);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    line-height: 1;
    padding: 0;
  }

  .zoom-icon-btn:hover { background: var(--accent-soft); }

  .zoom-icon-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .marquee-hint {
    position: absolute;
    bottom: 10px;
    left: 10px;
    z-index: 6;
    background: rgba(255, 255, 255, 0.92);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
    color: #46564a;
    max-width: 320px;
  }

  /* Popover */
  .popover {
    position: fixed;
    max-width: 320px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
    padding: 14px 16px;
    font-size: 13px;
    line-height: 1.5;
    z-index: 50;
    display: none;
  }

  .popover h4 { margin: 0 0 6px; color: var(--accent); font-size: 14px; }
  .popover .years { font-weight: 600; margin-bottom: 6px; }
  .popover a { color: var(--accent); }
  .popover .close {
    position: absolute;
    top: 6px;
    right: 9px;
    cursor: pointer;
    color: #888;
    font-size: 16px;
  }
</style>
</head>
<body>

<header>
  <div class="controls">
    <div class="segmented" id="segmented">
      <button data-map="suitability" class="active">Suitability</button>
      <button data-map="fungal">Fungal Network</button>
      <button data-map="tree">Tree Network</button>
    </div>

    <div class="label-group">
      Trees
      <button class="info-btn" data-info="trees" aria-label="Tree data source">i</button>
    </div>

    <div class="label-group">
      Fungi
      <button class="info-btn" data-info="fungi" aria-label="Fungi data source">i</button>
    </div>
  </div>

  <div class="metadata">
    <span>Tree census years: <strong id="meta-tree-years"></strong></span>
    <span>Fungal observation years: <strong id="meta-fungi-years"></strong></span>
    <span>Fungal networks counted: <strong id="meta-network-count">computing...</strong></span>
  </div>
</header>

<div class="map-stage" id="stage">
  <iframe id="frame-suitability" class="active" src="map1_suitability.html" title="Habitat suitability map"></iframe>
  <iframe id="frame-fungal" src="map2_fungal_network.html" title="Fungal network map"></iframe>
  <iframe id="frame-tree" src="map3_tree_network.html" title="Tree network map"></iframe>

  <div class="marquee-overlay" id="overlay">
    <div class="marquee-box" id="marqueeBox"></div>
  </div>

  <!-- Floating zoom toolbar: separate from the map toggle buttons -->
  <div class="zoom-toolbar">
    <button class="zoom-icon-btn" id="zoomTool" title="Zoom to area: click then drag a box">
      &#x26F6;
    </button>
    <button class="zoom-icon-btn" id="resetView" title="Reset view">
      &#x21BA;
    </button>
  </div>

  <div class="marquee-hint" id="hint">
    Drag to pan. Scroll or use +/- to zoom. Click the box icon above to zoom to an area.
  </div>
</div>

<div class="popover" id="popover">
  <span class="close" id="popoverClose">&times;</span>
  <div id="popoverBody"></div>
</div>

<script>
/* =====================================================================
   EDIT BLOCK: data source descriptions, years, and source links
   ---------------------------------------------------------------------
   Update this block to change popover content and the metadata strip.
   ===================================================================== */
const DATA_INFO = {
  trees: {
    title: "Tree census data",
    years: "2015 to 2016",
    source: "https://data.cityofnewyork.us/Environment/2015-Street-Tree-Census-Tree-Data/uvpi-gqnh",
    sourceLabel: "NYC Open Data: 2015 Street Tree Census",
    body:
      "Tree locations and species come from the NYC Street Tree Census " +
      "(2015-2016). Each point is a surveyed street tree with a recorded " +
      "species and trunk diameter. The tree network map links nearby trees " +
      "that can share the same belowground fungal partners."
  },
  fungi: {
    title: "Fungal observation data",
    years: "2010 to 2023",
    source: "https://www.inaturalist.org/observations?place_id=674&taxon_id=47169",
    sourceLabel: "iNaturalist: Fungal observations in New York",
    body:
      "Fungal points come from community mushroom observations on iNaturalist " +
      "(2010-2023), recorded with date and GPS coordinates. Edges connect " +
      "observations close enough to plausibly share the same underground network. " +
      "The suitability map estimates where conditions favor these fungi."
  }
};
/* ===================== END EDIT BLOCK ============================== */

document.getElementById("meta-tree-years").textContent = DATA_INFO.trees.years;
document.getElementById("meta-fungi-years").textContent = DATA_INFO.fungi.years;

/* ---- Mutually exclusive map toggle ---- */
const frames = {
  suitability: document.getElementById("frame-suitability"),
  fungal: document.getElementById("frame-fungal"),
  tree: document.getElementById("frame-tree")
};

const segmented = document.getElementById("segmented");
let activeKey = "suitability";

segmented.addEventListener("click", function (event) {
  const button = event.target.closest("button[data-map]");
  if (!button) return;
  const key = button.dataset.map;
  if (key === activeKey) return;
  for (const b of segmented.querySelectorAll("button")) {
    b.classList.toggle("active", b === button);
  }
  for (const k in frames) {
    frames[k].classList.toggle("active", k === key);
  }
  activeKey = key;
});

/* ---- Reach into a Folium iframe to get its Leaflet map object ---- */
function getLeafletMap(frame) {
  try {
    const win = frame.contentWindow;
    if (!win) return null;
    for (const prop in win) {
      const value = win[prop];
      if (value && value._container && typeof value.fitBounds === "function") {
        return value;
      }
    }
  } catch (err) { /* cross-origin or not loaded yet */ }
  return null;
}

/* ---- Marquee zoom: arms for one box drag, then disarms ---- */
const overlay = document.getElementById("overlay");
const marqueeBox = document.getElementById("marqueeBox");
const zoomTool = document.getElementById("zoomTool");
const hint = document.getElementById("hint");

const HINT_IDLE = "Drag to pan. Scroll or use +/- to zoom. Click the box icon above to zoom to an area.";
const HINT_ARMED = "Click and drag a box on the map to zoom into it.";

let dragging = false;
let startX = 0;
let startY = 0;

function setArmed(on) {
  overlay.classList.toggle("armed", on);
  zoomTool.classList.toggle("active", on);
  hint.textContent = on ? HINT_ARMED : HINT_IDLE;
}

zoomTool.addEventListener("click", function () {
  setArmed(!overlay.classList.contains("armed"));
});

/* ---- Reset view: reload the active map to its starting extent ---- */
document.getElementById("resetView").addEventListener("click", function () {
  setArmed(false);
  const frame = frames[activeKey];
  try {
    frame.contentWindow.location.reload();
  } catch (err) {
    frame.src = frame.src;
  }
});

overlay.addEventListener("mousedown", function (event) {
  if (!overlay.classList.contains("armed")) return;
  dragging = true;
  const rect = overlay.getBoundingClientRect();
  startX = event.clientX - rect.left;
  startY = event.clientY - rect.top;
  marqueeBox.style.left = startX + "px";
  marqueeBox.style.top = startY + "px";
  marqueeBox.style.width = "0px";
  marqueeBox.style.height = "0px";
  marqueeBox.style.display = "block";
  event.preventDefault();
});

overlay.addEventListener("mousemove", function (event) {
  if (!dragging) return;
  const rect = overlay.getBoundingClientRect();
  const x = event.clientX - rect.left;
  const y = event.clientY - rect.top;
  marqueeBox.style.left = Math.min(x, startX) + "px";
  marqueeBox.style.top = Math.min(y, startY) + "px";
  marqueeBox.style.width = Math.abs(x - startX) + "px";
  marqueeBox.style.height = Math.abs(y - startY) + "px";
});

function endMarquee(event) {
  if (!dragging) return;
  dragging = false;
  marqueeBox.style.display = "none";
  const rect = overlay.getBoundingClientRect();
  const endX = event.clientX - rect.left;
  const endY = event.clientY - rect.top;
  const dx = Math.abs(endX - startX);
  const dy = Math.abs(endY - startY);
  setArmed(false);
  const map = getLeafletMap(frames[activeKey]);
  if (!map) return;
  if (dx < 8 || dy < 8) return;
  const p1 = map.containerPointToLatLng([Math.min(startX, endX), Math.min(startY, endY)]);
  const p2 = map.containerPointToLatLng([Math.max(startX, endX), Math.max(startY, endY)]);
  map.fitBounds([[p1.lat, p1.lng], [p2.lat, p2.lng]]);
}

overlay.addEventListener("mouseup", endMarquee);
overlay.addEventListener("mouseleave", function (event) {
  if (dragging) endMarquee(event);
});

/* ---- Info popovers ---- */
const popover = document.getElementById("popover");
const popoverBody = document.getElementById("popoverBody");

document.querySelectorAll(".info-btn").forEach(function (btn) {
  btn.addEventListener("click", function (event) {
    const info = DATA_INFO[btn.dataset.info];
    popoverBody.innerHTML =
      "<h4>" + info.title + "</h4>" +
      "<div class='years'>Years: " + info.years + "</div>" +
      "<p>" + info.body + "</p>" +
      "<p><a href='" + info.source + "' target='_blank' rel='noopener'>" + info.sourceLabel + "</a></p>";
    const rect = btn.getBoundingClientRect();
    popover.style.display = "block";
    popover.style.top = (rect.bottom + 8) + "px";
    popover.style.left = Math.min(rect.left, window.innerWidth - 340) + "px";
    event.stopPropagation();
  });
});

document.getElementById("popoverClose").addEventListener("click", function () {
  popover.style.display = "none";
});

document.addEventListener("click", function (event) {
  if (!popover.contains(event.target) && !event.target.classList.contains("info-btn")) {
    popover.style.display = "none";
  }
});

/* =====================================================================
   FUNGAL NETWORK COUNT
   Counts distinct connected components (union find) from polyline
   edges in map2_fungal_network.html.
   ===================================================================== */
function countFungalNetworks(mapHtml) {
  const edgeBlocks = mapHtml.match(/L\.polyline\(\s*\[\[[^;]*?\]\]/g) || [];
  const parent = {};

  function find(node) {
    if (parent[node] === undefined) parent[node] = node;
    while (parent[node] !== node) {
      parent[node] = parent[parent[node]];
      node = parent[node];
    }
    return node;
  }

  function union(a, b) {
    parent[find(a)] = find(b);
  }

  const nodes = new Set();

  edgeBlocks.forEach(function (block) {
    const nums = block.match(/-?\d+\.\d+/g);
    if (!nums || nums.length < 4) return;
    const points = [];
    for (let i = 0; i + 1 < nums.length; i += 2) {
      points.push(Number(nums[i]).toFixed(6) + "," + Number(nums[i + 1]).toFixed(6));
    }
    for (let i = 0; i < points.length - 1; i++) {
      if (points[i] === points[i + 1]) continue;
      nodes.add(points[i]);
      nodes.add(points[i + 1]);
      union(points[i], points[i + 1]);
    }
  });

  const roots = new Set();
  nodes.forEach(function (node) { roots.add(find(node)); });
  return roots.size;
}

fetch("map2_fungal_network.html")
  .then(function (r) { return r.text(); })
  .then(function (html) {
    document.getElementById("meta-network-count").textContent = countFungalNetworks(html);
  })
  .catch(function () {
    document.getElementById("meta-network-count").textContent = "unavailable";
  });
</script>
</body>
</html>
