<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Belowground Network Explorer</title>

<!--
=====================================================================
  BELOWGROUND NETWORK EXPLORER
  Summary of updates (most recent rebuild)
=====================================================================

  This page used to merge three maps into a single combined layer.
  It now keeps them separate and lets you switch between them.

  What changed in this rebuild:

  1. MAP TOGGLES
     The three source maps are no longer combined. A mutually
     exclusive segmented control (three buttons) switches between:
        Button 1  ->  map1_suitability.html
        Button 2  ->  map2_fungal_network.html
        Button 3  ->  map3_tree_network.html
     Only one map is ever shown at a time.

  2. MARQUEE ZOOM AND ZOOM OUT (interaction fixed)
     The map is fully interactive by default: drag to pan, scroll or
     use the plus and minus buttons to zoom in and out, click markers
     to read them. To zoom into a chosen rectangle, click the "Zoom to
     area" button, then click and drag a box on the map. After the zoom
     the tool turns itself off and normal panning returns. A "Reset
     view" button reloads the active map to its starting zoomed out
     extent, so there is always a clear way back out. This avoids the
     earlier problem where an invisible selection layer blocked all
     clicks on the map and left no way to zoom out.

  3. INFO POPOVERS
     Small info buttons sit next to the Trees and Fungi labels.
     Clicking one opens a popover describing where the data comes
     from. The text lives in the clearly marked EDIT BLOCK below so
     it is easy to find and change.

  4. METADATA CLARITY
     The origin years for the tree census data and the fungal
     observation data are shown directly in the popovers and in the
     metadata strip under the controls.

  5. CLICK PERMISSIONS
     Interactions are kept minimal: the only controls are the toggle
     buttons, the info buttons, the zoom to area button, and the
     map's own controls. The slash goal banner has been removed.

  6. NETWORK CALCULATION
     A connected components algorithm counts how many distinct
     fungal networks exist in the fungal map. It reads the edges
     drawn on map2, builds a graph, and counts connected graphs
     using a union find structure. The result is shown in the
     metadata strip once the fungal map source has loaded.

  Constraint honored: no em dashes anywhere in this file.
=====================================================================
-->

<style>
  :root {
    --ink: #1b2a1b;
    --bg: #f4f7f2;
    --panel: #ffffff;
    --accent: #2e7d32;
    --accent-soft: #e2efe2;
    --border: #cdd8cd;
  }

  * { box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    margin: 0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    color: var(--ink);
    background: var(--bg);
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 16px 20px 12px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }

  .popover a { color: var(--accent); }

  .controls {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 14px;
    margin-top: 14px;
  }

  .segmented {
    display: inline-flex;
    border: 1px solid var(--accent);
    border-radius: 8px;
    overflow: hidden;
  }

  .segmented button {
    border: none;
    background: var(--panel);
    color: var(--accent);
    padding: 9px 16px;
    font-size: 14px;
    cursor: pointer;
    border-right: 1px solid var(--accent);
  }

  .segmented button:last-child { border-right: none; }

  .segmented button.active {
    background: var(--accent);
    color: #fff;
  }

  .tool-btn {
    border: 1px solid var(--accent);
    background: var(--panel);
    color: var(--accent);
    padding: 9px 16px;
    font-size: 14px;
    border-radius: 8px;
    cursor: pointer;
  }

  .tool-btn.active {
    background: var(--accent);
    color: #fff;
  }

  .label-group {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
  }

  .info-btn {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1px solid var(--accent);
    background: var(--panel);
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    line-height: 1;
  }

  .info-btn:hover { background: var(--accent-soft); }

  .metadata {
    margin-top: 12px;
    font-size: 13px;
    color: #46564a;
  }

  .metadata span { margin-right: 18px; }

  .map-stage {
    position: relative;
    width: 100%;
    flex: 1;
    min-height: 300px;
  }

  .map-stage iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: none;
  }

  .map-stage iframe.active { display: block; }

  /*
    Marquee overlay sits on top of the active map. By default it lets
    every mouse event pass straight through to the map (pointer-events
    none) so the map can be panned and clicked normally. It only starts
    capturing the drag once the "Zoom to area" tool arms it by adding
    the "armed" class.
  */
  .marquee-overlay {
    position: absolute;
    inset: 0;
    z-index: 5;
    background: transparent;
    pointer-events: none;
  }

  .marquee-overlay.armed {
    pointer-events: auto;
    cursor: crosshair;
  }

  .marquee-box {
    position: absolute;
    border: 1.5px dashed var(--accent);
    background: rgba(46, 125, 50, 0.15);
    pointer-events: none;
    display: none;
  }

  .marquee-hint {
    position: absolute;
    bottom: 10px;
    left: 10px;
    z-index: 6;
    background: rgba(255, 255, 255, 0.92);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
    color: #46564a;
    max-width: 320px;
  }

  /* Popover */
  .popover {
    position: fixed;
    max-width: 320px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
    padding: 14px 16px;
    font-size: 13px;
    line-height: 1.5;
    z-index: 50;
    display: none;
  }

  .popover h4 { margin: 0 0 6px; color: var(--accent); font-size: 14px; }
  .popover .years { font-weight: 600; }
  .popover .close {
    position: absolute;
    top: 6px;
    right: 9px;
    cursor: pointer;
    color: #888;
    font-size: 16px;
  }
</style>
</head>
<body>

<header>
  <div class="controls">
    <!-- Mutually exclusive segmented control. One map at a time. -->
    <div class="segmented" id="segmented">
      <button data-map="suitability" class="active">Suitability</button>
      <button data-map="fungal">Fungal Network</button>
      <button data-map="tree">Tree Network</button>
    </div>

    <!-- Arms the marquee zoom for one box selection. -->
    <button class="tool-btn" id="zoomTool">Zoom to area</button>

    <!-- Reloads the active map back to its starting zoomed out view. -->
    <button class="tool-btn" id="resetView">Reset view</button>

    <div class="label-group">
      Trees
      <button class="info-btn" data-info="trees" aria-label="Tree data source">i</button>
    </div>

    <div class="label-group">
      Fungi
      <button class="info-btn" data-info="fungi" aria-label="Fungi data source">i</button>
    </div>
  </div>

  <div class="metadata">
    <span>Tree census years: <strong id="meta-tree-years"></strong></span>
    <span>Fungal observation years: <strong id="meta-fungi-years"></strong></span>
    <span>Fungal networks counted: <strong id="meta-network-count">computing...</strong></span>
  </div>
</header>

<div class="map-stage" id="stage">
  <iframe id="frame-suitability" class="active" src="map1_suitability.html" title="Habitat suitability map"></iframe>
  <iframe id="frame-fungal" src="map2_fungal_network.html" title="Fungal network map"></iframe>
  <iframe id="frame-tree" src="map3_tree_network.html" title="Tree network map"></iframe>

  <div class="marquee-overlay" id="overlay">
    <div class="marquee-box" id="marqueeBox"></div>
  </div>
  <div class="marquee-hint" id="hint">
    Drag to pan. Scroll or use plus and minus to zoom. Click "Zoom to area" to box zoom.
  </div>
</div>

<!-- Popover container, content injected from the EDIT BLOCK below. -->
<div class="popover" id="popover">
  <span class="close" id="popoverClose">&times;</span>
  <div id="popoverBody"></div>
</div>

<script>
/* =====================================================================
   EDIT BLOCK: data source descriptions and origin years
   ---------------------------------------------------------------------
   Change the text and years here. These values feed both the info
   popovers and the metadata strip under the controls.
   ===================================================================== */
const DATA_INFO = {
  trees: {
    title: "Tree census data",
    years: "2015 to 2016",
    source: "https://data.cityofnewyork.us/Environment/2015-Street-Tree-Census-Tree-Data/uvpi-gqnh",
    sourceLabel: "NYC Open Data: 2015 Street Tree Census",
    body:
      "Tree locations and species come from the NYC Street Tree Census. " +
      "Each point is a surveyed street tree with a recorded species and " +
      "trunk diameter. The tree network map links nearby trees that can " +
      "share the same belowground fungal partners."
  },
  fungi: {
    title: "Fungal observation data",
    years: "2010 to 2023",
    source: "https://www.inaturalist.org/observations?place_id=674&taxon_id=47169",
    sourceLabel: "iNaturalist: Fungal observations in New York",
    body:
      "Fungal points come from community mushroom observations recorded " +
      "with date and coordinates. Edges connect observations that are " +
      "close enough to plausibly belong to the same underground network. " +
      "The suitability map estimates where conditions favor these fungi."
  }
};
/* ===================== END EDIT BLOCK ============================== */

/* ---- Wire metadata strip from the edit block ---- */
document.getElementById("meta-tree-years").textContent = DATA_INFO.trees.years;
document.getElementById("meta-fungi-years").textContent = DATA_INFO.fungi.years;

/* ---- Map toggle: mutually exclusive segmented control ---- */
const frames = {
  suitability: document.getElementById("frame-suitability"),
  fungal: document.getElementById("frame-fungal"),
  tree: document.getElementById("frame-tree")
};

const segmented = document.getElementById("segmented");
let activeKey = "suitability";

segmented.addEventListener("click", function (event) {
  const button = event.target.closest("button[data-map]");
  if (!button) return;

  const key = button.dataset.map;
  if (key === activeKey) return;

  for (const b of segmented.querySelectorAll("button")) {
    b.classList.toggle("active", b === button);
  }
  for (const k in frames) {
    frames[k].classList.toggle("active", k === key);
  }
  activeKey = key;
});

/* ---- Reach into a Folium iframe and return its Leaflet map ---- */
function getLeafletMap(frame) {
  try {
    const win = frame.contentWindow;
    if (!win) return null;
    for (const prop in win) {
      const value = win[prop];
      if (value && value._container && typeof value.fitBounds === "function") {
        return value;
      }
    }
  } catch (err) {
    /* Cross origin or not loaded yet. Returns null and we skip zoom. */
  }
  return null;
}

/* ---- Zoom to area tool: arms the marquee for one box selection ---- */
const overlay = document.getElementById("overlay");
const marqueeBox = document.getElementById("marqueeBox");
const zoomTool = document.getElementById("zoomTool");
const hint = document.getElementById("hint");

const HINT_IDLE = "Drag to pan. Scroll or use plus and minus to zoom. Click \"Zoom to area\" to box zoom.";
const HINT_ARMED = "Click and drag a box on the map to zoom into it.";

let dragging = false;
let startX = 0;
let startY = 0;

function setArmed(on) {
  overlay.classList.toggle("armed", on);
  zoomTool.classList.toggle("active", on);
  hint.textContent = on ? HINT_ARMED : HINT_IDLE;
}

zoomTool.addEventListener("click", function () {
  setArmed(!overlay.classList.contains("armed"));
});

/* ---- Reset view: reload the active map to its starting extent ---- */
const resetView = document.getElementById("resetView");

resetView.addEventListener("click", function () {
  setArmed(false);
  const frame = frames[activeKey];
  try {
    frame.contentWindow.location.reload();
  } catch (err) {
    frame.src = frame.src;
  }
});

overlay.addEventListener("mousedown", function (event) {
  if (!overlay.classList.contains("armed")) return;
  dragging = true;
  const rect = overlay.getBoundingClientRect();
  startX = event.clientX - rect.left;
  startY = event.clientY - rect.top;
  marqueeBox.style.left = startX + "px";
  marqueeBox.style.top = startY + "px";
  marqueeBox.style.width = "0px";
  marqueeBox.style.height = "0px";
  marqueeBox.style.display = "block";
  event.preventDefault();
});

overlay.addEventListener("mousemove", function (event) {
  if (!dragging) return;
  const rect = overlay.getBoundingClientRect();
  const x = event.clientX - rect.left;
  const y = event.clientY - rect.top;
  marqueeBox.style.left = Math.min(x, startX) + "px";
  marqueeBox.style.top = Math.min(y, startY) + "px";
  marqueeBox.style.width = Math.abs(x - startX) + "px";
  marqueeBox.style.height = Math.abs(y - startY) + "px";
});

function endMarquee(event) {
  if (!dragging) return;
  dragging = false;
  marqueeBox.style.display = "none";

  const rect = overlay.getBoundingClientRect();
  const endX = event.clientX - rect.left;
  const endY = event.clientY - rect.top;

  const dx = Math.abs(endX - startX);
  const dy = Math.abs(endY - startY);

  /* The tool turns itself off after one attempt so panning returns. */
  setArmed(false);

  const map = getLeafletMap(frames[activeKey]);
  if (!map) return;

  /* A tiny drag is treated as a click and ignored. */
  if (dx < 8 || dy < 8) return;

  const p1 = map.containerPointToLatLng([Math.min(startX, endX), Math.min(startY, endY)]);
  const p2 = map.containerPointToLatLng([Math.max(startX, endX), Math.max(startY, endY)]);
  map.fitBounds([[p1.lat, p1.lng], [p2.lat, p2.lng]]);
}

overlay.addEventListener("mouseup", endMarquee);
overlay.addEventListener("mouseleave", function (event) {
  if (dragging) endMarquee(event);
});

/* ---- Info popovers ---- */
const popover = document.getElementById("popover");
const popoverBody = document.getElementById("popoverBody");

document.querySelectorAll(".info-btn").forEach(function (btn) {
  btn.addEventListener("click", function (event) {
    const info = DATA_INFO[btn.dataset.info];
    popoverBody.innerHTML =
      "<h4>" + info.title + "</h4>" +
      "<div class='years'>Years: " + info.years + "</div>" +
      "<p>" + info.body + "</p>" +
      "<p><a href='" + info.source + "' target='_blank' rel='noopener'>" + info.sourceLabel + "</a></p>";

    const rect = btn.getBoundingClientRect();
    popover.style.display = "block";
    popover.style.top = (rect.bottom + 8) + "px";
    popover.style.left = Math.min(rect.left, window.innerWidth - 340) + "px";
    event.stopPropagation();
  });
});

document.getElementById("popoverClose").addEventListener("click", function () {
  popover.style.display = "none";
});

document.addEventListener("click", function (event) {
  if (!popover.contains(event.target) && !event.target.classList.contains("info-btn")) {
    popover.style.display = "none";
  }
});

/* =====================================================================
   FUNGAL NETWORK COUNT
   ---------------------------------------------------------------------
   Counts how many distinct fungal networks exist by treating every
   drawn edge in the fungal map as a connection between two points and
   counting the connected graphs with a union find structure.

   Two points are the same node when their rounded coordinates match.
   The count is the number of connected components that contain at
   least one real edge.
   ===================================================================== */
function countFungalNetworks(mapHtml) {
  const edgeBlocks = mapHtml.match(/L\.polyline\(\s*\[\[[^;]*?\]\]/g) || [];

  const parent = {};
  function find(node) {
    if (parent[node] === undefined) parent[node] = node;
    while (parent[node] !== node) {
      parent[node] = parent[parent[node]];
      node = parent[node];
    }
    return node;
  }
  function union(a, b) {
    parent[find(a)] = find(b);
  }

  const nodes = new Set();

  edgeBlocks.forEach(function (block) {
    const nums = block.match(/-?\d+\.\d+/g);
    if (!nums || nums.length < 4) return;

    const points = [];
    for (let i = 0; i + 1 < nums.length; i += 2) {
      const lat = Number(nums[i]).toFixed(6);
      const lng = Number(nums[i + 1]).toFixed(6);
      points.push(lat + "," + lng);
    }

    for (let i = 0; i < points.length - 1; i++) {
      if (points[i] === points[i + 1]) continue;
      nodes.add(points[i]);
      nodes.add(points[i + 1]);
      union(points[i], points[i + 1]);
    }
  });

  const roots = new Set();
  nodes.forEach(function (node) { roots.add(find(node)); });
  return roots.size;
}

/* Load the fungal map source, count the networks, show the result. */
fetch("map2_fungal_network.html")
  .then(function (response) { return response.text(); })
  .then(function (html) {
    const count = countFungalNetworks(html);
    document.getElementById("meta-network-count").textContent = count;
  })
  .catch(function () {
    document.getElementById("meta-network-count").textContent = "unavailable";
  });
</script>
</body>
</html>
